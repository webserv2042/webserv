server
{
    listen 8080;
    server_name localhost;
    root ./www;
    index index.html;
    client_max_body_size 1048576;

    location /
    {
        root ./www;
        allow_methods GET POST DELETE;
        index index.html;
    }

    location /cgi-bin
    {
        root ./www;
        allow_methods GET POST;
        cgi .php /usr/bin/php-cgi;
        cgi .py /usr/bin/python3;
        cgi .sh /usr/bin/bash;
    }

    location /uploads
    {
        root ./www;
        allow_methods GET POST DELETE;
        autoindex on;
        upload_path ./www/uploads;
    }
}
