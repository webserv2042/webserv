<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>403 - Accès Interdit</title>
    <style>
        body { background: #fef2f2; color: #991b1b; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid #dc2626; max-width: 500px; width: 90%; }
        h1 { font-size: 100px; margin: 0; color: #dc2626; }
        h2 { font-size: 24px; margin: 10px 0; text-transform: uppercase; }
        p { line-height: 1.6; font-size: 1.1em; }
        hr { border: 0; height: 1px; background: #fecaca; margin: 30px 0; }
        .footer { font-size: 0.8em; color: #dc2626; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>403</h1>
        <h2>Forbidden</h2>
        <p>Vous n'avez pas les permissions nécessaires pour accéder à cette zone.</p>
        <hr>
        <div class="footer">Webserv/1.1 (Senshy Edition)</div>
    </div>
</body>
</html>
