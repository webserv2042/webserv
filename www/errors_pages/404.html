<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Introuvable</title>
    <style>
        body { background: #eff6ff; color: #1e40af; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid #3b82f6; max-width: 500px; width: 90%; }
        h1 { font-size: 100px; margin: 0; color: #2563eb; }
        h2 { font-size: 24px; margin: 10px 0; text-transform: uppercase; }
        p { line-height: 1.6; font-size: 1.1em; }
        hr { border: 0; height: 1px; background: #dbe Xfe; margin: 30px 0; }
        .footer { font-size: 0.8em; color: #2563eb; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>404</h1>
        <h2>Not Found</h2>
        <p>La ressource demandée est introuvable.</p>
        <hr>
        <div class="footer">Webserv/1.1 (Senshy Edition)</div>
    </div>
</body>
</html>
