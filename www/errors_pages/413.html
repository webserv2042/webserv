<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>413 - Fichier trop lourd</title>
    <style>
        body { background: #f5f3ff; color: #5b21b6; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid #8b5cf6; max-width: 500px; width: 90%; }
        h1 { font-size: 100px; margin: 0; color: #7c3aed; }
        h2 { font-size: 24px; margin: 10px 0; text-transform: uppercase; }
        p { line-height: 1.6; font-size: 1.1em; }
        hr { border: 0; height: 1px; background: #ddd6fe; margin: 30px 0; }
        .footer { font-size: 0.8em; color: #7c3aed; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>413</h1>
        <h2>Payload Too Large</h2>
        <p>Ce fichier est beaucoup trop volumineux pour les capacités actuelles de notre serveur.</p>
        <hr>
        <div class="footer">Webserv/1.1 (Senshy Edition)</div>
    </div>
</body>
</html>
