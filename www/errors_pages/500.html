<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>500 - Erreur Serveur</title>
    <style>
        body { background: #111827; color: #f9fafb; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; background: #1f2937; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-top: 6px solid #ef4444; max-width: 500px; width: 90%; }
        h1 { font-size: 100px; margin: 0; color: #ef4444; }
        h2 { font-size: 24px; margin: 10px 0; text-transform: uppercase; color: #f9fafb; }
        p { line-height: 1.6; font-size: 1.1em; color: #d1d5db; }
        hr { border: 0; height: 1px; background: #374151; margin: 30px 0; }
        .footer { font-size: 0.8em; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="card">
        <h1>500</h1>
        <h2>Internal Error</h2>
        <p>Désolé, une erreur interne est survenue.</p>
        <hr>
        <div class="footer">Webserv/1.1 (Senshy Edition)</div>
    </div>
</body>
</html>
