<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>400 - Requête Invalide</title>
    <style>
        body { background: #fff5eb; color: #92400e; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid #f59e0b; max-width: 500px; width: 90%; }
        h1 { font-size: 100px; margin: 0; color: #d97706; }
        h2 { font-size: 24px; margin: 10px 0; text-transform: uppercase; }
        p { line-height: 1.6; font-size: 1.1em; color: #b45309; }
        hr { border: 0; height: 1px; background: #fed7aa; margin: 30px 0; }
        .footer { font-size: 0.8em; color: #d97706; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>400</h1>
        <h2>Bad Request</h2>
        <p>Le serveur n'a pas pu interpréter votre requête.</p>
        <hr>
        <div class="footer">Webserv/1.1 (Senshy Edition)</div>
    </div>
</body>
</html>
