server
{
    listen 8080;
    server_name localhost;
    root ./www/;
    client_max_body_size 10485760;

    location /
    {
        root ./www/public_html;
        allow_methods GET;
        cgi .php /usr/bin/php-cgi;
        index index.html;
    }

    location /cgi-bin
    {
        root ./www;
        allow_methods GET POST;
        cgi .php /usr/bin/php-cgi;
        cgi .py /usr/bin/python3;
        cgi .sh /usr/bin/bash;
    }

    location /public_html
    {
        root ./www;
        allow_methods GET POST;
    }

    location /uploads
    {
        root ./www;
        allow_methods GET POST DELETE;
        autoindex on;
        upload_path ./www/uploads;
    }

    location /database
    {
        root ./www;
        allow_methods GET POST DELETE;
    }
}

server {
    listen 8000;
    server_name localhost;
    
    root ./www/;

    location / {
        root ./www/other_content;
        allow_methods GET;
    }

    location /other_content
    {
        root ./www;
        allow_methods GET;
    }
}
