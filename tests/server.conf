server
{
    listen 8080;
    server_name localhost;
    root ./www/;

    location /
    {
        root ./www/public_html;
        allow_methods GET POST;
        cgi .php /usr/bin/php-cgi;
        index index.html;
    }

    location /upload {
        allow_methods POST;
        upload_path ./uploads;
    }

    location /cgi-bin
    {
        root ./www;
        allow_methods GET POST;
        cgi .php /usr/bin/php-cgi;
        cgi .py /usr/bin/python3;
        cgi .sh /usr/bin/bash;
    }

    location /public_html
    {
        root ./www;
        allow_methods GET POST;
    }

    location /uploads
    {
        root ./www;
        allow_methods GET POST DELETE;
    }

    location /database
    {
        root ./www;
        allow_methods GET POST DELETE;
    }
}

server
{
    listen 8000;
    server_name localhost;
    root ./www/;

    location /
    {
        root ./www/public_html;
        allow_methods GET POST;
        cgi .php /usr/bin/php-cgi;
        index index.html;
    }

    location /cgi-bin
    {
        root ./www/cgi-bin;
        allow_methods GET POST;
        cgi .php /usr/bin/php-cgi;
        cgi .py /usr/bin/python3;
        cgi .sh /usr/bin/bash;
    }

    location /uploads
    {
        root ./www;
        allow_methods GET POST DELETE;
        autoindex on;
    }
}

