<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>408 - Délai d'attente dépassé</title>
    <style>
        body { 
            background: #f1f5f9; 
            color: #334155; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            text-align: center; 
            background: white; 
            padding: 50px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border-top: 6px solid #64748b; 
            max-width: 500px; 
            width: 90%; 
        }
        h1 { font-size: 100px; margin: 0; color: #475569; }
        h2 { font-size: 24px; margin: 10px 0; text-transform: uppercase; }
        p { line-height: 1.6; font-size: 1.1em; color: #475569; }
        hr { border: 0; height: 1px; background: #e2e8f0; margin: 30px 0; }
        .footer { font-size: 0.8em; color: #64748b; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>408</h1>
        <h2>Request Timeout</h2>
        <p>Le serveur a attendu trop longtemps l'envoi de votre requête. La connexion a été interrompue.</p>
        <hr>
        <div class="footer">Webserv/1.1 (Senshy Edition)</div>
    </div>
</body>
</html>
